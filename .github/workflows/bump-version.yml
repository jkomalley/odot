name: Bump Version

on:
  workflow_dispatch:
    inputs:
      part:
        description: 'Version part to bump (major, minor, patch, dev, beta, alpha, rc)'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
          - dev
          - beta
          - alpha
          - rc

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Just
        uses: taiki-e/install-action@just

      - name: Bump Version
        run: just bump-version ${{ inputs.part }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: bump version to ${{ inputs.part }}"
          title: "chore: bump version to ${{ inputs.part }}"
          body: "Automated version bump triggered via GitHub Actions workflow."
          branch: "chore/bump-version"
          delete-branch: true
