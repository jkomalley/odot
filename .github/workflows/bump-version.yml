name: Bump Version

on:
  workflow_dispatch:
    inputs:
      part:
        description: 'Version part to bump (major, minor, patch, dev, beta, alpha, rc)'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
          - dev
          - beta
          - alpha
          - rc

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Just
        uses: taiki-e/install-action@just

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Bump Version
        run: just bump-version ${{ inputs.part }}

      - name: Commit and Tag
        run: |
          NEW_VERSION=$(uv version)
          git commit -a -m "chore: bump version to $NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin main --tags
